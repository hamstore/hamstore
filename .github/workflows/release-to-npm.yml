name: 🚀 Release to NPM

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Install node_modules
        uses: ./.github/actions/install-node-modules

      - name: Package
        uses: ./.github/actions/package

      - name: Set packages versions
        run: yarn set-packages-versions ${{ github.event.release.tag_name }}

      - name: Copy paste root README to @hamstore/core
        run: cp README.md ./packages/core/README.md

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v3
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Publish packages to npm
        run: yarn nx run-many --target=publish-package --all --parallel=1
