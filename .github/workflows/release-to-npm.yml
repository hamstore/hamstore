name: 🚀 Release to NPM

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Validate release type consistency
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          
          # Check if tag has a pre-release suffix (e.g., -rc1, -beta.1, -alpha.2)
          if [[ "$TAG_NAME" =~ -[a-zA-Z] ]]; then
            TAG_HAS_PRERELEASE="true"
          else
            TAG_HAS_PRERELEASE="false"
          fi
          
          if [ "$TAG_HAS_PRERELEASE" != "$IS_PRERELEASE" ]; then
            echo "::error::Mismatch between tag name and release type. Tag '$TAG_NAME' $([ "$TAG_HAS_PRERELEASE" = "true" ] && echo "has" || echo "does not have") a pre-release suffix, but the GitHub release pre-release flag is set to '$IS_PRERELEASE'. Either both must indicate a pre-release, or neither."
            exit 1
          fi

      - name: Install node_modules
        uses: ./.github/actions/install-node-modules

      - name: Package
        uses: ./.github/actions/package

      - name: Set packages versions
        run: pnpm set-packages-versions ${{ github.event.release.tag_name }}

      - name: Copy paste root README to @hamstore/core
        run: cp README.md ./packages/core/README.md

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "tag=next" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      # Provenance requires OIDC, which isn't available for new packages.
      # To bootstrap new packages: add an NPM_PUBLISH_TOKEN repo secret →
      # publish a prerelease → configure OIDC for the new packages → remove
      # the secret. Full releases always require OIDC provenance.
      - name: Determine publish auth mode
        id: publish-auth
        run: |
          if [ -n "$NPM_PUBLISH_TOKEN" ] && [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "provenance=" >> $GITHUB_OUTPUT
            echo "::notice::Publishing with NPM_PUBLISH_TOKEN (no provenance)"
          else
            echo "provenance=1" >> $GITHUB_OUTPUT
            echo "::notice::Publishing with OIDC provenance"
          fi
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Publish packages to npm
        run: pnpm nx run-many --target=publish-package --all --parallel=1
        env:
          NPM_DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
          NPM_PROVENANCE: ${{ steps.publish-auth.outputs.provenance }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
