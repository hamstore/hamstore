name: Preview Release

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  preview:
    name: Publish Preview
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Install node_modules
        uses: ./.github/actions/install-node-modules

      - name: Package
        uses: ./.github/actions/package

      - name: Set placeholder versions
        run: node -e "const fs=require('fs'),path=require('path');for(const d of fs.readdirSync('packages')){const p=path.join('packages',d,'package.json');if(!fs.existsSync(p))continue;const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version='0.0.0';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')}"

      - name: Publish Preview
        run: npx pkg-pr-new publish --compact './packages/*'
