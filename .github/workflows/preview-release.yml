name: Preview Release

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  preview:
    name: Publish Preview
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Install node_modules
        uses: ./.github/actions/install-node-modules

      - name: Package
        uses: ./.github/actions/package

      - name: Set placeholder versions
        run: |
          # Packages don't carry a version field (set dynamically at release time).
          # npm pack requires one, so we inject a placeholder.
          # Unlike set-packages-versions, this does NOT rewrite dependency ranges,
          # so preview packages stay compatible with published releases.
          for pkg in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const j = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              j.version = '0.0.0';
              fs.writeFileSync('$pkg', JSON.stringify(j, null, 2) + '\n');
            "
          done

      - name: Publish Preview
        run: npx pkg-pr-new publish --compact './packages/*'
