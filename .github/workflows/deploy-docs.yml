name: 📖 Deploy docs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    name: 📖 Deploy docs
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install node_modules
        uses: ./.github/actions/install-node-modules

      - name: Package
        uses: ./.github/actions/package

      - name: Build website
        run: pnpm nx run docs:build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/build
          branch: gh-pages
          # Preserve the `pr-preview/` umbrella dir (see deploy-docs-preview.yml)
          # while still pruning pages removed/renamed in prod from the gh-pages
          # root. This is the same action pr-preview-action uses internally.
          clean-exclude: pr-preview/
