name: 📝 Draft or update next release
concurrency: draft_or_update_next_release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CI: true

jobs:
  prepare-deployment:
    name: 📝 Draft or update next release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
