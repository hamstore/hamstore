# cf https://github.com/marketplace/actions/release-drafter
name-template: 'v$RESOLVED_VERSION ЁЯМИ'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - type: version-resolver
    semver-increment: major
    when:
      labels:
        - major
  - type: version-resolver
    semver-increment: minor
    when:
      labels:
        - minor
  - type: version-resolver
    semver-increment: patch
    when:
      labels:
        - patch
  - type: version-resolver
    semver-increment: patch
exclude-labels:
  - ignore-for-release
autolabeler:
  - label: major
    title:
      - '/^[a-z]+(\(.+\))?!:/'
  - label: minor
    title:
      - '/^feat(\(.+\))?:/'
  - label: patch
    title:
      - '/^(fix|perf)(\(.+\))?:/'
  - label: ignore-for-release
    title:
      - '/^(ci|test)(\(.+\))?:/'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
template: |
  ## Changes

  $CHANGES
