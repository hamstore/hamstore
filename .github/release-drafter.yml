# cf https://github.com/marketplace/actions/release-drafter
name-template: 'v$RESOLVED_VERSION ЁЯМИ'
tag-template: 'v$RESOLVED_VERSION'
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
  patch:
    labels:
      - patch
  default: patch
autolabeler:
  - label: major
    title:
      - '/^.+!:/'
  - label: minor
    title:
      - '/^feat(\(.+\))?:/'
  - label: patch
    title:
      - '/^fix(\(.+\))?:/'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
template: |
  ## Changes

  $CHANGES
