# cf https://github.com/marketplace/actions/release-drafter
name-template: 'v$RESOLVED_VERSION ЁЯМИ'
tag-template: 'v$RESOLVED_VERSION'
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
  patch:
    labels:
      - patch
  default: patch
autolabeler:
  - label: major
    title:
      - '/^(break(ing)?|release)(\(.+\))?!?:/'
      - '/^.+!:/'
  - label: minor
    title:
      - '/^(new|update|feature)(\(.+\))?:/'
  - label: patch
    title:
      - '/^(fix|deps|docs|perf|revert|styles?|security|types?|chore|misc)(\(.+\))?:/'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
template: |
  ## Changes

  $CHANGES
